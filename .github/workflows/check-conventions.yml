name: Check conventions freshness

on:
  push:
    branches: [main]
    paths:
      - "conventions/**"
      - "CONVENTIONS.md"
      - "scripts/assemble-conventions.sh"
  pull_request:
    paths:
      - "conventions/**"
      - "CONVENTIONS.md"
      - "scripts/assemble-conventions.sh"

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Verify CONVENTIONS.md matches assembled output
        run: |
          bash scripts/assemble-conventions.sh
          if ! git diff --exit-code CONVENTIONS.md; then
            echo "::error::CONVENTIONS.md is out of date. Run 'bash scripts/assemble-conventions.sh' and commit."
            exit 1
          fi
