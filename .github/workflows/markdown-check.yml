name: Markdown check (reusable)

on:
  workflow_call:
    inputs:
      prettier-version:
        description: Prettier version to use
        type: string
        default: "3"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - run: npx prettier@${{ inputs.prettier-version }} --check "**/*.md"
